<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KeyMagic KMS Playground</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --accent: #6ea8fe;
    --accent-2: #7ee787;
    --warn: #f0883e;
    --err: #ff6b6b;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--panel);
  }
  header h1 {
    font-size: 16px;
    margin: 0;
    font-weight: 600;
  }
  header .sub {
    color: var(--muted);
    font-size: 12px;
  }
  header .spacer { flex: 1; }
  header button, .toolbar button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  header button:hover, .toolbar button:hover { border-color: var(--accent); color: var(--accent); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    height: calc(100vh - 53px);
  }
  .pane {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane-header {
    padding: 10px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pane-header h2 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .pane-header .badge {
    font-size: 11px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .pane-header .badge.ok { color: var(--accent-2); border-color: rgba(126,231,135,.3); }
  .pane-header .badge.err { color: var(--err); border-color: rgba(255,107,107,.3); }

  .pane-body { flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 12px 16px; gap: 10px; }

  /* typing area */
  #typed {
    width: 100%;
    flex: 1;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 28px;
    line-height: 1.8;
    font-family: 'Padauk', 'Myanmar Text', 'Noto Sans Myanmar', var(--mono);
    resize: none;
    outline: none;
  }
  #typed:focus { border-color: var(--accent); }
  #typed.fallback { color: var(--muted); }

  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .row .lbl { color: var(--muted); font-size: 12px; min-width: 110px; }
  .stats {
    display: flex;
    gap: 18px;
    font-size: 12px;
    color: var(--muted);
  }
  .stats code { color: var(--accent); font-family: var(--mono); }


  /* script editor */
  #script {
    width: 100%;
    flex: 1;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.55;
    resize: none;
    outline: none;
    tab-size: 2;
  }
  #script:focus { border-color: var(--accent); }

  #errors {
    background: rgba(255,107,107,.08);
    border: 1px solid rgba(255,107,107,.3);
    color: var(--err);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 12px;
    max-height: 120px;
    overflow: auto;
    display: none;
    white-space: pre-wrap;
  }
  #errors.show { display: block; }

  .toolbar { display: flex; gap: 8px; align-items: center; }

  .hint {
    font-size: 12px;
    color: var(--muted);
  }
  .hint kbd {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
  }

  details { color: var(--muted); font-size: 12px; }
  details summary { cursor: pointer; padding: 4px 0; }
  details ul { margin: 6px 0; padding-left: 20px; }
  details code { color: var(--accent-2); font-family: var(--mono); }

  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; height: auto; }
  }
</style>
</head>
<body>

<header>
  <h1>⌨️ KeyMagic KMS Playground</h1>
  <span class="sub">Type Latin keys → get the script's mapped output. Powered by a JS port of the KeyMagic engine.</span>
  <span class="spacer"></span>
  <button id="btn-reset">Reset</button>
  <button id="btn-sample">Load sample text</button>
</header>

<div class="layout">
  <!-- LEFT: typing pane -->
  <section class="pane">
    <div class="pane-header">
      <h2>Type here</h2>
      <span class="badge" id="kb-badge">no keyboard</span>
      <span class="spacer" style="flex:1"></span>
      <span class="hint">type <kbd>u</kbd> <kbd>d</kbd> <kbd>g</kbd> ...</span>
    </div>
    <div class="pane-body">
      <textarea id="typed" placeholder="Start typing..." spellcheck="false" autofocus></textarea>

      <div class="stats">
        <span>context: <code id="st-context">""</code></span>
        <span>switches: <code id="st-switches">—</code></span>
        <span>history: <code id="st-history">0</code></span>
      </div>
    </div>
  </section>

  <!-- RIGHT: script editor -->
  <section class="pane">
    <div class="pane-header">
      <h2>KMS script</h2>
      <span class="badge" id="rule-count">0 rules</span>
      <span class="spacer" style="flex:1"></span>
      <div class="toolbar">
        <button id="btn-apply">Apply</button>
        <button id="btn-default">Restore default</button>
        <button id="btn-clear">Clear typing</button>
      </div>
    </div>
    <div class="pane-body">
      <textarea id="script" spellcheck="false" placeholder="Paste a .kms script here..."></textarea>
      <div id="errors"></div>
    </div>
  </section>
</div>

<script src="js/kms-parser.js"></script>
<script src="js/kms-engine.js"></script>
<script src="js/default-keyboard.js"></script>
<script src="js/app.js"></script>
</body>
</html>
