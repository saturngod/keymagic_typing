<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KeyMagic Typing</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --accent: #6ea8fe;
    --accent-2: #7ee787;
    --warn: #f0883e;
    --err: #ff6b6b;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--panel);
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 15px;
    margin: 0;
    font-weight: 600;
    white-space: nowrap;
  }
  header .spacer { flex: 1; }
  header select, header button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }
  header select:focus, header button:hover { border-color: var(--accent); }
  header label { font-size: 12px; color: var(--muted); }

  /* status badge */
  .badge {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--muted);
    user-select: none;
    letter-spacing: 0.02em;
  }
  .badge.on  { color: var(--accent-2); border-color: rgba(126,231,135,.35); background: rgba(126,231,135,.08); }
  .badge.off { color: var(--muted); }

  .hint { font-size: 12px; color: var(--muted); }
  .hint kbd {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
  }

  /* typing area */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 20px 0;
    min-height: 0;
    gap: 12px;
  }
  #typed {
    width: 100%;
    flex: 1;
    min-height: 160px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    font-size: 26px;
    line-height: 1.7;
    font-family: 'Padauk', 'Myanmar Text', 'Noto Sans Myanmar', var(--mono);
    resize: none;
    outline: none;
  }
  #typed:focus { border-color: var(--accent); }

  /* on-screen keyboard */
  .keyboard {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
    transition: opacity .15s;
  }
  .keyboard.dim { opacity: .45; }
  .kb-row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .key {
    position: relative;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 46px;
    height: 46px;
    cursor: pointer;
    font-family: 'Padauk', 'Myanmar Text', 'Noto Sans Myanmar', var(--mono);
    padding: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: stretch;
    transition: border-color .1s, transform .05s;
  }
  .key:hover { border-color: var(--accent); }
  .key:active { transform: translateY(1px); }
  .key .shift-glyph {
    position: absolute;
    top: 3px;
    right: 5px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1;
    transition: color .1s, font-size .1s;
  }
  /* When the shift layer is active (Shift held or CapsLock on), the shifted
     glyph lights up and the base glyph recedes — like a real OS keyboard. */
  .key .shift-glyph.active {
    color: var(--accent);
    font-size: 17px;
    top: 12px;
    right: 50%;
    transform: translateX(50%);
    font-weight: 600;
  }
  .key .base-glyph {
    font-size: 18px;
    text-align: center;
    padding-bottom: 4px;
    line-height: 1;
    transition: color .1s, font-size .1s;
  }
  .key .base-glyph.dim { color: var(--border); }
  .key .base-glyph.faded {
    color: var(--muted);
    font-size: 11px;
    padding-bottom: 2px;
  }
  .key .us-label {
    position: absolute;
    bottom: 2px;
    left: 4px;
    font-size: 9px;
    color: var(--muted);
    font-family: var(--mono);
    line-height: 1;
    opacity: .6;
  }
  /* wide keys */
  .key.wide-2 { width: 92px; }
  .key.wide-3 { width: 140px; }
  .key.wide-6 { width: 280px; }
  .key.wide-6 .base-glyph { font-size: 12px; color: var(--muted); }

  @media (max-width: 720px) {
    .key { width: 34px; height: 40px; }
    .key.wide-2 { width: 68px; }
    .key.wide-3 { width: 102px; }
    .key.wide-6 { width: 180px; }
    #typed { font-size: 20px; }
  }
</style>
</head>
<body>

<header>
  <h1>⌨️ KeyMagic Typing</h1>
  <label>Keyboard:
    <select id="kb-select">
      <option value="keyboards/MyanSan.kms">MyanSan (မြန်စံ)</option>
      <option value="keyboards/PangLong.kms">PangLong ( Shan)</option>
      <option value="keyboards/PaOh.kms">PaOh</option>
      <option value="keyboards/SGaw-Kawthoolei_ksw.kms">Sgaw Karen (Kawthoolei)</option>
      <option value="keyboards/Western-Pwo_pwo.kms">Western Pwo Karen</option>
      <option value="keyboards/Eastern-Pwo_kjp.kms">Eastern Pwo Karen</option>
    </select>
  </label>
  <span class="badge off" id="status-badge">OFF</span>
  <span class="spacer"></span>
  <span class="hint">Press <kbd>Ctrl</kbd>+<kbd>Shift</kbd> to toggle input method</span>
  <button id="btn-clear">Clear</button>
</header>

<main>
  <textarea id="typed" placeholder="Type here...  (Ctrl+Shift to enable the keyboard layout)" spellcheck="false" autofocus></textarea>
  <div class="keyboard" id="keyboard"><!-- rows injected by typing.js --></div>
</main>

<script src="js/kms-parser.js"></script>
<script src="js/kms-engine.js"></script>
<script src="js/typing.js"></script>
</body>
</html>
