<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KeyMagic Typing</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #8b93a3;
    --accent: #6ea8fe;
    --accent-2: #7ee787;
    --warn: #f0883e;
    --err: #ff6b6b;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--panel);
    flex-wrap: wrap;
  }
  header h1 {
    font-size: 15px;
    margin: 0;
    font-weight: 600;
    white-space: nowrap;
  }
  header .spacer { flex: 1; }
  header select, header button {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }
  header select:focus, header button:hover { border-color: var(--accent); }
  header label { font-size: 12px; color: var(--muted); }

  /* ON/OFF toggle switch — click to enable/disable the keyboard layout */
  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 5px 12px 5px 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    user-select: none;
    letter-spacing: 0.04em;
    transition: border-color .15s, background .15s, color .15s;
  }
  .toggle:hover { border-color: var(--accent); }
  .toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .toggle .knob {
    width: 34px;
    height: 18px;
    border-radius: 10px;
    background: #3a4150;
    position: relative;
    flex-shrink: 0;
    transition: background .2s;
  }
  .toggle .knob::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--muted);
    transition: transform .2s ease, background .2s;
  }
  .toggle.on {
    color: var(--accent-2);
    border-color: rgba(126,231,135,.4);
    background: rgba(126,231,135,.08);
  }
  .toggle.on .knob { background: rgba(126,231,135,.5); }
  .toggle.on .knob::after { transform: translateX(16px); background: var(--accent-2); }

  .hint { font-size: 12px; color: var(--muted); }
  .hint kbd {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
  }

  /* typing area */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 20px 0;
    min-height: 0;
    gap: 12px;
  }
  #typed {
    width: 100%;
    flex: 1;
    min-height: 160px;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    font-size: 26px;
    line-height: 1.7;
    font-family: 'Padauk', 'Myanmar Text', 'Noto Sans Myanmar', var(--mono);
    resize: none;
    outline: none;
  }
  #typed:focus { border-color: var(--accent); }

  /* on-screen keyboard */
  .keyboard {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
    transition: opacity .15s;
  }
  .keyboard.dim { opacity: .45; }
  .kb-row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .key {
    position: relative;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 46px;
    height: 46px;
    cursor: pointer;
    font-family: 'Padauk', 'Myanmar Text', 'Noto Sans Myanmar', var(--mono);
    padding: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: stretch;
    transition: border-color .1s, transform .05s;
  }
  .key:hover { border-color: var(--accent); }
  .key:active { transform: translateY(1px); }
  .key .shift-glyph {
    position: absolute;
    top: 3px;
    right: 5px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1;
    transition: color .1s, font-size .1s;
  }
  /* When the shift layer is active (Shift held or CapsLock on), the shifted
     glyph lights up and the base glyph recedes — like a real OS keyboard. */
  .key .shift-glyph.active {
    color: var(--accent);
    font-size: 17px;
    top: 12px;
    right: 50%;
    transform: translateX(50%);
    font-weight: 600;
  }
  .key .base-glyph {
    font-size: 18px;
    text-align: center;
    padding-bottom: 4px;
    line-height: 1;
    transition: color .1s, font-size .1s;
  }
  .key .base-glyph.dim { color: var(--border); }
  .key .base-glyph.faded {
    color: var(--muted);
    font-size: 11px;
    padding-bottom: 2px;
  }
  .key .us-label {
    position: absolute;
    bottom: 2px;
    left: 4px;
    font-size: 9px;
    color: var(--muted);
    font-family: var(--mono);
    line-height: 1;
    opacity: .6;
  }
  /* wide keys */
  .key.wide-2 { width: 92px; }
  .key.wide-3 { width: 140px; }
  .key.wide-6 { width: 280px; }
  .key.wide-6 .base-glyph { font-size: 12px; color: var(--muted); }

  /* action keys (Shift / Enter / Backspace) */
  .key.action-key {
    background: var(--border);
    justify-content: center;
    align-items: center;
  }
  .key.action-key .base-glyph {
    font-size: 13px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-weight: 600;
    color: var(--text);
    padding-bottom: 0;
    letter-spacing: 0.02em;
  }
  .key.action-key:hover { background: #363c4a; border-color: var(--accent); }
  .key.action-key.shift-active {
    background: rgba(110,168,254,.18);
    border-color: var(--accent);
    color: var(--accent);
  }

  @media (max-width: 720px) {
    .key { width: 32px; height: 40px; }
    .key.wide-2 { width: 64px; }
    .key.wide-3 { width: 92px; }
    .key.wide-6 { width: 168px; }
    .key .base-glyph { font-size: 16px; }
    .key .shift-glyph { font-size: 10px; }
    .key .shift-glyph.active { font-size: 15px; }
    #typed { font-size: 19px; padding: 14px; min-height: 120px; }
  }

  /* Tight phones — keep the full layout on screen, shrink keys to fit. */
  @media (max-width: 480px) {
    header { padding: 8px 10px; gap: 8px; }
    header h1 { font-size: 14px; }
    header select, header button { padding: 5px 8px; font-size: 12px; }
    main { padding: 10px 8px 0; gap: 8px; }
    .keyboard { padding: 8px; gap: 5px; margin-bottom: 10px; }
    .kb-row { gap: 4px; }
    .key { width: 26px; height: 36px; }
    .key.wide-2 { width: 52px; }
    .key.wide-3 { width: 74px; }
    .key.wide-6 { width: 136px; }
    .key .base-glyph { font-size: 14px; padding-bottom: 3px; }
    .key .shift-glyph { font-size: 9px; }
    .key .shift-glyph.active { font-size: 13px; top: 10px; }
    .key .us-label { font-size: 8px; }
    .key.action-key .base-glyph { font-size: 11px; }
    #typed { font-size: 17px; padding: 12px; min-height: 100px; }
    /* On touch devices the Ctrl+Shift hint is irrelevant; show the click hint. */
    .hint-keys { display: none; }
  }

  /* Touch devices: hide the Ctrl+Shift hint and surface the click hint
     everywhere, not just on small screens. */
  @media (hover: none) and (pointer: coarse) {
    .hint-keys { display: none; }
    .hint-click { display: inline; }
  }
  /* On mouse/keyboard devices, the click hint is hidden by default. */
  .hint-click { display: none; }
  @media (max-width: 480px) { .hint-click { display: inline; } }
</style>
</head>
<body>

<header>
  <h1>⌨️ KeyMagic Typing</h1>
  <label>Keyboard:
    <select id="kb-select">
      <option value="keyboards/MyanSan.kms">MyanSan (မြန်စံ)</option>
      <option value="keyboards/Shan-Standard.kms">Shan (Standard)</option>
      <option value="keyboards/PangLong.kms">PangLong ( Shan)</option>
      <option value="keyboards/PaOh.kms">PaOh</option>
      <option value="keyboards/SGaw-Kawthoolei_ksw.kms">Sgaw Karen (Kawthoolei)</option>
      <option value="keyboards/Western-Pwo_pwo.kms">Western Pwo Karen</option>
      <option value="keyboards/Eastern-Pwo_kjp.kms">Eastern Pwo Karen</option>
    </select>
  </label>
  <button class="toggle off" id="status-toggle" type="button" role="switch" aria-checked="false" aria-label="Toggle keyboard layout on or off">
    <span class="knob" aria-hidden="true"></span>
    <span class="toggle-label">OFF</span>
  </button>
  <span class="spacer"></span>
  <span class="hint"><span class="hint-click">Click the ON/OFF switch</span><span class="hint-keys">Press <kbd>Ctrl</kbd>+<kbd>Shift</kbd> to toggle input method</span></span>
  <a class="hint" href="https://github.com/saturngod/keymagic_typing" target="_blank" rel="noopener">GitHub</a>
  <button id="btn-clear">Clear</button>
</header>

<main>
  <textarea id="typed" placeholder="Type here...  (Ctrl+Shift to enable the keyboard layout)" spellcheck="false" autofocus></textarea>
  <div class="keyboard" id="keyboard"><!-- rows injected by typing.js --></div>
</main>

<script src="js/kms-parser.js"></script>
<script src="js/kms-engine.js"></script>
<script src="js/typing.js"></script>
</body>
</html>
